events:
  - name: Bal Folk Tanzabend und Workshop im M26
    details: "Seid alle herzlich eingeladen zum 1. Bal Folk Tanzabend im M26! Bal Folk – das sind eine Vielzahl von Mixern, Kreis-, Ketten- und Paartänzen aus Frankreich und Europa, getanzt zu zeitgenössischem Folk. Kommt allein oder als Paar. Alle tanzen mit allen – wir tanzen frei von geschlechtsspezifischen Tanzrollen, alle dürfen Spaß haben am Führen, Folgen und Co-Führen!\n\n18:30 Uhr: Einstiegsworkshop mit Xenia\n\n19:30-21:30 Uhr: Grandioser Live-Ball\n\nmit Indigo am diatonischen Akkordeon\n\nEveryone is warmly invited to the 1st Bal Folk dance evening at M26! Bal Folk features a variety of mixers, circle dances, line dances, and partner dances from France and Europe, set to contemporary folk music. Come alone or as a couple. Everyone dances with everyone—we dance free from gender-specific roles, and everyone is welcome to enjoy leading, following, and co-leading!\n\n6:30 PM: Introductory workshop with Xenia\n\n7:30–9:30 PM: Grand live ball with Indigo on the diatonic accordion"
    links:
