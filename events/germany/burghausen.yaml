  - name: Balfolk für Einsteiger
    details: "<p>Balfolk ist eine lebendige und gesellige Tanzform mit Wurzeln in europäischen Volkstänzen, vor allem aus Frankreich. In diesem Anfängerkurs lernst du einfache Kreis‑ und Reihentänze zu mitreißender Live-Musik – ganz ohne Vorkenntnisse. Der Fokus liegt auf Freude an Bewegung, gemeinsamen Tanzen und einem entspannten Miteinander. Du kannst alleine kommen, oder ihr kommt zu Zweit - es gibt <strong>keinen festen</strong> Tanzpartner. Einfach mitmachen, ausprobieren und Spaß haben!</p><ul><li>Der Kurs beginnt am 29. September und geht über <b>8 Abende </b>bis einschließlich 17. November 2026</li><li>Die Gebühr für den Kurs beträgt <b>40 € pro Teilnehmer:in</b></li><li>Wir sorgen, wie üblich, für Getränke zum Selbstkostenpreis</li><li>Geparkt werden kann nahe in der kostenlosen Tiefgarage gleich unter dem Bürgerplatz</li><li>Tanzanleiterin ist unsere Maria</li></ul><br>Anmeldung unter <a href=\"https://balfolk-burghausen.de/events/balfolk-fuer-einsteiger/\" target=\"_blank\"><u>Balfolk für Einsteiger – Balfolk Burghausen</u></a>"
    links:
      - "https://www.balfolk-burghausen.de"
    start: "2026-09-29T19:00:00+02:00"
    end: "2026-09-29T20:30:00+02:00"
    country: Germany
    city: Burghausen
    styles:
      - balfolk
    workshop: false
    social: false
    price: €40
    organisation: Balfolk Burghausen
