  - name: Montagsminibal
    details: "🌸🌷🪻SINGEN mit EMILY 🌺🌼🏵️\n💃🕺BalFolk mit Emily & the Simons🎻🕺💃\nWann: Montag, 20. April; ab 17 Uhr singen, ab 20 Uhr tanzen\nWo: Stadtteilzentrum Vauban Haus 37, Alfred-Döblin-Platz 1, 79100 Freiburg\n  \n\nSingen: 17:00-18:30 Uhr im Haus 37, Saal B\nVor unserem BalFolk mit Emily & the Simons wird Emily 17:00 Uhr – 18:30 Uhr einen Sing-Workshop anbieten.\nWir werden einige ihrer Lieblingskanons und mehrstimmige Lieder nach Gehör lernen und gemeinsam singen. (Notenlesen ist nicht notwendig.)\nKostenbeteiligung: Spende nach Selbsteinschätzung 6-10€ \n  \nTanzen: 20:00-23:00 Uhr im Haus 37, Saal A\nAb 20 Uhr wird uns die wunderbare anglo-belgische Gruppe Emily & the Simons einen vielfarbigen, romantischen, mitreißenden Balfolk spielen.\nKostenbeteiligung: Spende nach Selbsteinschätzung 10-20€ \nEmily & the Simons sind ein anglo-belgisches Balfolk-Trio. Im Mittelpunkt ihrer Musik stehen Emilys Kompositionen, die sich von den Begegnungen im Leben und der Energie auf der Tanzfläche inspirieren lassen. Ihr Stil ist sehr ausdrucksstark,voller Improvisation, Leidenschaft, Zärtlichkeit und Verspieltheit. Mit einem breiten Repertoire, das von exquisiten, sinnlichen Mazurken bis zu fröhlichen, treibenden Bourrées reicht, regt ihre Musik die Fantasie an, bewegt die Füße und hebt den Geist. \nEmily Bowden: UK – Fiddle\nSimon Dumpleton: UK – Chromatic accordion\nSimon Laffineur: BE – Guitar"
    links:
      - "https://7schritt.de/kalender/montagsminibal-mit-emely-and-the-simons/"
    start: "2026-04-20T20:00:00+02:00"
    end: "2026-04-20T23:00:00+02:00"
    country: Germany
    city: Freiburg i. Br
    styles:
      - balfolk
    workshop: false
    social: true
    bands:
