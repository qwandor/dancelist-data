  - name: Monday Minibal
    details: "Minibal mit Son’or\nDie drei jungen Musiker von Son’Or kommen aus unterschiedlichen Ecken der keltischen Welt, Irland, Deutschland, Frankreich und Großbritannien, und teilen eine besondere Leidenschaft für Bretonische Musik. Ihre musikalischen Einflüsse umfassen alte Traditionen wie das bretonische „kan ha diskan“ und die irische Sessionmusik, die nun mit jazzigen Akkorden und kleinen freudigen Momenten der Verspieltheit neu verbunden werden. Flinke Fiddle- und Flöte Melodien paaren sich mit rhythmischer Gitarre- und Akkordeonbässe zu einem “goldenen Sound“ (= Son’Or), der zum Tanzen ermutigt. \nLouise Gillman: Geige, Gesang \nBrian Haitz: Gitarre, Flöten, Gesang \nJonas Linhart: diatonisches Akkordeon, Gesang"
