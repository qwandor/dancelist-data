  - name: "Monday Dancing: Dancing for all"
    details: "Hallo in die Runde, \ngestern haben wir final beschlossen, am kommenden Ostermontag, dem 21.4. zu tanzen.\nSagt das gerne weiter und bringt Freunde und Verwandte mit!\n– Jürgen und Jens (und noch 2? die mir entfallen sind…Sorry!) Werden spielen. 🙂 Danke im Voraus! \nDa aber kein Workshop geplant ist, sind sicher noch mehr Musiker:innen willkommen!\nBringt eure Instrumente mit und sprecht euch mit den oben Genannten ab! \n!Das Musiziertreffen ab 19 Uhr fällt aber aus!\nDer Saal ist ab 20 Uhr offen.\n-Dafür (fürs Öffnen) danke Julia und/oder Barbara!  \neuch+uns+allen eine schöne Woche, erholsame F<EIER>tage () und einen frohen Eiertanz am Montag 😀 \nKarin"
    links:
      - "https://7schritt.de/kalender/monstagstanzen-anfaenger-5/"
