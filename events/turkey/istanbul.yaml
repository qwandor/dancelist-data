  - name: "Balfest'Day"
    details: "Get ready for two days of pure magic at Arsen Lüpen Taksim! Workshops by day, concerts and dancing by night—both floors are ours! Join us downstairs for hands-on workshops, and upstairs for food, drinks, and endless conversations!🥳\r\n\r\nAs the sun sets, lower floor transforms into a dance floor with concerts that will blow your mind! Relax on the terrace or dance the night away—your choice!\r\n\r\nDay 1 brings you workshops, balfolk concerts, and a FREE concert by Zero Band and Zerrin Mete at Arsen Lüpen! Mazurka Klandestina keeps the vibes alive on the terrace!🌈\r\n\r\n📌Secure your spot with the FULL PASS TICKET for 600 TL! Limited to 50 seats—act fast! Dance Workshop participation included.\r\n\r\n📌For tickets and info, hit us up at balfolkist@gmail.com\r\n\r\n📌Can't commit to both days? Grab the Overnight CONCERTS PASS for 200 TL!\r\n\r\n✨Music enthusiasts, join the workshop for 100 TL (exclusive for full pass ticket holders)! Don't miss out on the Balfest'day experience—grab your tickets now!"
