    details: "Zaterdag 16 mei spelen Toon van Mierlo, Pascale Rubens, en hun twee Duitse vrienden en topmuzikanten Gudrun Walther en Jürgen Treyz voor u ten dans in het prachtige Huis de Pelikaan, in een uitzonderlijke kwartet-formatie.\n\nVervolgens zet het kersverse Brusselse duo 'Kouran Der' het bal verder, met Martin op chromatische akkordeon en Andréa op elektrische gitaar.\n\nNadien wordt er gejamd en verder gedanst. Alle muzikanten en zangers welkom!\n\n19u45 Welkom\n20u00 Naragonia + Gudrun & Jürgen\n22u30 Kouran Der\n23u30 Jam\n\n🎟️ Tickets zijn €25 (standaard) of €30 (steunticket).\nHet resultaat gaat integraal naar de artiesten.\nHet steunticket draagt bij voor de tweede band en de techniek.\n\nReserveer je ticket met een overschrijving naar:\nTomas Walter J Fiers, BE18 9676 3424 4465,\nmededeling \"Pelikaanbal 16 mei\" + eventueel de naam/namen voor wie je overschrijft.\n\n🏠 Adres: Huis De Pelikaan, Sint-Katelijnestraat 11, Gent.\nMeer over het huis: https://www.instagram.com/depelicaen/\n\n🫧 Er zijn enkele gratis tickets beschikbaar voor vrijwilligers; stuur me een berichtje voor meer info.\nAls je enkel voor de jam komt (na 23u30) hoef je geen ticketje te kopen; stuur me ook even een berichtje.\nTot dan!"
