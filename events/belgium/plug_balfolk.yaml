  - name: BalhallaFestival
    details: "This winter, from February 27 to March 1, 2026, we’ll be dancing together in the venue of Sport Vlaanderen Gent. Over the course of three days, you can enjoy a 600 m² dance floor, a cozy jam space where musicians come together, and a variety of inspiring music and dance workshops. An open stage will showcase surprising new talent, while the main program brings you the best of the Belgian folk scene, complemented by a few standout international headliners."
