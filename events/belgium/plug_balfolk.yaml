  - name: Festival Dranouter
    details: "Van 1 tot 3 augustus wordt Dranouter opnieuw het decor voor een sfeervol muziekfestival voor alle leeftijden, met dit jaar extra aandacht voor de Catalaanse folktraditie onder het thema ‘Focus Catalonië’.  Elke festivaldag eindigt feestelijk op folkpodium De Koer, waar Muziekcentrum Dranouter uitpakt met een bal op live muziek van balfolkbands Bargainatt, Marie Paulette en Bamako Express. Festival Dranouter belooft een zomerse mix van muziek, sfeer, foodtrucks!"
