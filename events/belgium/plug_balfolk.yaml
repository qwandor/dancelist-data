  - name: "Couple Dance Workshop: From Variations to Co-Leading (Liège – Belgium) (French & English)"
    details: "Saturday, April 11, 2026, from 10 a.m. to 6 p.m. in Liège.\r\n\r\nThroughout the day, we will guide you step by step to:\r\n\r\nImprove leading and following→ Practical techniques and concrete tips to better propose, better listen, and better understand one another.\r\n\r\nExplore simple and reusable variations→ Accessible variations that can be applied in all your couple dances.\r\n\r\nDiscover co-leading→ Through our 3-step method, we will explore a dance where roles blend and follow one another, creating a subtle, fluid, and lively connection."
